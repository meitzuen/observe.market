name: Update Stock Data

on:
  # Kept as fallback only — GitHub schedule is unreliable (often 15-60min late)
  schedule:
    - cron: "30 5 * * 1-5"
  # Primary trigger: called by an external cron service via HTTP POST to GitHub API
  repository_dispatch:
    types: [trigger-stock-update]
  workflow_dispatch:
    inputs:
      date_str:
        description: "Date string to fetch (YYYY-MM-DD). If empty, today's date will be used."
        required: false
        default: ""

# 明確宣告權限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run fetch script
        run: |
          DATE_STR="${{ github.event.inputs.date_str || github.event.client_payload.date_str }}"
          if [ -z "$DATE_STR" ]; then
            DATE_STR=$(date +'%Y-%m-%d')
          fi
          echo "Processing data for date: $DATE_STR"
          python src/fetch_and_save.py --date_str="$DATE_STR"
          python src/generate_stock_history.py
          python src/gap_strategy.py --date_str="$DATE_STR"
          python src/generate_manifest.py
          python src/fetch_stock_info.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add docs/data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update stock data: $(date +'%Y-%m-%d')"
            git push
          fi
