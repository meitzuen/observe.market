<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Observer | 市場觀測站</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Huninn&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --primary: #3b82f6;
        --primary-dark: #2563eb;
        --bg: #f1f5f9;
        --card-bg: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --up: #ef4444;
        --down: #22c55e;
        --accent: #8b5cf6;
      }

      body {
        font-family:
          "Huninn",
          "Noto Sans TC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      header {
        background-color: var(--card-bg);
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        font-family: "Huninn", "Noto Sans TC", sans-serif;
        background: linear-gradient(to right, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 1.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      @media (min-width: 1024px) {
        .grid {
          grid-template-columns: 2.5fr 1fr;
        }
      }

      .card {
        background: var(--card-bg);
        border-radius: 1rem;
        border: 1px solid var(--border);
        padding: 1.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transition: transform 0.2s;
      }

      .card:hover {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 700;
        font-family: "Huninn", "Noto Sans TC", sans-serif;
        margin-bottom: 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid var(--primary);
        padding-left: 0.75rem;
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        text-align: left;
      }

      th {
        padding: 1rem 0.75rem;
        background-color: #f8fafc;
        border-bottom: 2px solid var(--border);
        font-weight: 600;
        color: var(--text-muted);
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.025em;
      }

      td {
        padding: 1rem 0.75rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9375rem;
      }

      tr:hover td {
        background-color: #f8fafc;
      }

      .price-up {
        color: var(--up);
        font-weight: 600;
      }
      .price-down {
        color: var(--down);
        font-weight: 600;
      }

      .search-box {
        margin-bottom: 1.25rem;
        position: relative;
      }

      .search-box input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        font-size: 0.9375rem;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.2s, box-shadow 0.2s;
        background-color: #f8fafc;
      }

      .search-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        background-color: white;
      }

      .date-select {
        padding: 0.5rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid var(--border);
        background: white;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        outline: none;
      }

      .date-select:focus {
        border-color: var(--primary);
      }

      .loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 200px;
        font-style: italic;
        color: var(--text-muted);
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .stat-item {
        background: #f8fafc;
        padding: 1.25rem;
        border-radius: 0.75rem;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .stat-label {
        font-size: 0.875rem;
        color: var(--text-muted);
        font-weight: 500;
      }
      .stat-value {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--primary-dark);
      }

      .badge {
        display: inline-block;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 0.5rem;
      }

      .badge-primary { background-color: #dbeafe; color: #1e40af; }
      .badge-accent { background-color: #ede9fe; color: #5b21b6; }
      .badge-danger { background-color: #fee2e2; color: #991b1b; }

      .sidebar-section {
        margin-bottom: 1.5rem;
      }

      .list-item {
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
        transition: background-color 0.2s;
      }

      .list-item:hover {
        background-color: #f8fafc;
      }

      .list-item:last-child {
        border-bottom: none;
      }

      .tag {
        font-size: 0.7rem;
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
        background: #eee;
        color: #666;
        margin-right: 0.3rem;
      }

      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.75rem;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 600;
        transition: background 0.2s;
      }

      .btn:hover {
        background: var(--primary-dark);
      }

      .btn-secondary {
        background: var(--text-muted);
      }

      .btn-secondary:hover {
        background: #475569;
      }

      [v-cloak] {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <img id="header-logo" src="assets/logo.png" alt="Logo" style="height: 40px; width: auto;" onerror="this.style.display='none'; document.getElementById('header-emoji').style.display='inline';" />
        <span id="header-emoji" style="display: none; font-size: 1.5rem;">📈</span>
        <h1>Market Observer</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <select id="market-select" class="date-select" style="font-weight: 700; border-color: var(--primary);">
            <option value="twse">上市</option>
            <option value="tpex">上櫃</option>
            <option value="warrant">權證</option>
        </select>
        <div
          id="last-update"
          style="font-size: 0.875rem; color: var(--text-muted); font-weight: 500"
        ></div>
      </div>
    </header>

    <div class="container">
      <div class="grid">
        <div class="main-content">
          <div class="card" style="margin-bottom: 1.5rem">
            <div class="card-title">
              <span>大盤指數趨勢</span>
              <div
                id="index-date"
                style="font-size: 0.875rem; font-weight: normal; color: var(--text-muted)"
              ></div>
            </div>
            <div style="height: 300px; position: relative">
                <canvas id="indexChart"></canvas>
            </div>
          </div>

          <div class="card">
            <div class="card-title">
              <span
                >個股行情
                <span
                  id="stock-count"
                  class="badge badge-primary"
                ></span
              ></span>
              <select id="date-picker" class="date-select"></select>
            </div>
            <div class="search-box">
              <input
                type="text"
                id="stock-search"
                placeholder="搜尋代號或名稱..."
              />
            </div>
            <div
              class="filter-controls"
              style="
                display: flex;
                gap: 0.75rem;
                margin-bottom: 1.25rem;
                flex-wrap: wrap;
                align-items: center;
              "
            >
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 0.5rem;
                  background: #f1f5f9;
                  padding: 0.4rem 0.75rem;
                  border-radius: 0.75rem;
                  font-size: 0.875rem;
                  border: 1px solid var(--border);
                "
              >
                <span style="color: var(--text-muted); font-weight: 500">價格:</span>
                <input
                  type="number"
                  id="price-min"
                  placeholder="最小"
                  style="
                    width: 70px;
                    border: 1px solid var(--border);
                    border-radius: 6px;
                    padding: 0.2rem;
                  "
                />
                <span style="color: var(--text-muted)">-</span>
                <input
                  type="number"
                  id="price-max"
                  placeholder="最大"
                  style="
                    width: 70px;
                    border: 1px solid var(--border);
                    border-radius: 6px;
                    padding: 0.2rem;
                  "
                />
              </div>
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 0.5rem;
                  background: #f1f5f9;
                  padding: 0.4rem 0.75rem;
                  border-radius: 0.75rem;
                  font-size: 0.875rem;
                  border: 1px solid var(--border);
                "
              >
                <span style="color: var(--text-muted); font-weight: 500">成交量 > </span>
                <input
                  type="number"
                  id="volume-min"
                  placeholder="10,000"
                  style="
                    width: 90px;
                    border: 1px solid var(--border);
                    border-radius: 6px;
                    padding: 0.2rem;
                  "
                />
                <span style="color: var(--text-muted)">張</span>
              </div>
              <button
                id="clear-filters"
                class="btn btn-secondary"
                style="padding: 0.4rem 0.75rem"
              >
                清除條件
              </button>
            </div>
            <div class="table-container">
              <table id="stock-table">
                <thead>
                  <tr>
                    <th style="cursor: pointer" onclick="setSort('id')">
                      代號 <span id="sort-id"></span>
                    </th>
                    <th style="cursor: pointer" onclick="setSort('name')">
                      名稱 <span id="sort-name"></span>
                    </th>
                    <th style="cursor: pointer" onclick="setSort('close')">
                      成交價 <span id="sort-close"></span>
                    </th>
                    <th style="cursor: pointer" onclick="setSort('diff')">
                      漲跌 <span id="sort-diff"></span>
                    </th>
                    <th style="cursor: pointer" onclick="setSort('ratio')">
                      漲幅 <span id="sort-ratio"></span>
                    </th>
                    <th style="cursor: pointer" onclick="setSort('volume')">
                      成交量(張) <span id="sort-volume"></span>
                    </th>
                  </tr>
                </thead>
                <tbody id="stock-list">
                  <!-- Data will be loaded here -->
                </tbody>
              </table>
            </div>
            <div id="stock-loader" class="loader">載入中...</div>
            <div
              id="pagination-controls"
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 1.5rem;
                margin-top: 1.5rem;
                padding-top: 1.5rem;
                border-top: 1px solid var(--border);
              "
            >
              <button
                id="prev-page"
                class="btn btn-secondary"
                style="padding: 0.5rem 1rem"
              >
                上一頁
              </button>
              <span
                id="page-info"
                style="font-size: 0.875rem; color: var(--text-muted); font-weight: 600"
                >第 1 / 1 頁</span
              >
              <button
                id="next-page"
                class="btn btn-secondary"
                style="padding: 0.5rem 1rem"
              >
                下一頁
              </button>
            </div>
          </div>
        </div>

        <div class="sidebar">
          <div class="sidebar-section">
            <div class="card">
              <div class="card-title">市場摘要</div>
              <div id="market-summary" class="stats">
                <div class="stat-item" style="border-left: 4px solid var(--primary);">
                  <span class="stat-label">大盤指數</span>
                  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <span id="summary-index" class="stat-value">--</span>
                    <span id="summary-changes" style="font-weight: 700; font-size: 0.875rem;">--</span>
                  </div>
                </div>
                <div class="stat-item">
                  <span class="stat-label">成交金額</span>
                  <span id="summary-turnover" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">成交股數</span>
                  <span id="summary-volume" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">成交筆數</span>
                  <span id="summary-transactions" class="stat-value">--</span>
                </div>
              </div>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="card">
              <div class="card-title">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <select id="gap-type-switcher" class="date-select" style="font-size: 1rem; font-weight: 700; border: none; padding: 0; background: transparent; cursor: pointer; color: inherit; font-family: inherit;">
                        <option value="gap_jump">跳空上漲</option>
                        <option value="gap_drop">跳空下跌</option>
                    </select>
                    <span
                      id="gap-count"
                      class="badge badge-accent"
                    ></span>
                </div>
              </div>
              <div
                style="margin-bottom: 0.75rem; display: flex; justify-content: flex-end"
              >
                  <select id="gap-sort" class="date-select" style="font-size: 0.75rem; padding: 0.25rem 0.5rem">
                    <option value="diff-desc">漲點 ↓</option>
                    <option value="diff-asc">漲點 ↑</option>
                    <option value="ratio-desc">漲幅 ↓</option>
                    <option value="ratio-asc">漲幅 ↑</option>
                  </select>
              </div>
              <div
                id="gap-list"
                style="max-height: 350px; overflow-y: auto; font-size: 0.875rem"
              >
                <div class="loader" style="height: 100px">載入中...</div>
              </div>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="card">
              <div class="card-title">
                <span>處置股票</span>
                <span
                  id="punish-count"
                  class="badge badge-danger"
                ></span>
              </div>
              <div
                id="punish-list"
                style="max-height: 350px; overflow-y: auto; font-size: 0.875rem"
              >
                <div class="loader" style="height: 100px">載入中...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let fullManifest = null;
      let manifest = null;
      let currentMarket = "twse";
      let indexData = [];
      let currentStockData = [];
      let currentGapData = [];
      let currentPunishData = [];
      let filteredStocks = [];
      let chart = null;

      // Pagination & Sorting State
      let currentPage = 1;
      const rowsPerPage = 20;
      let sortColumn = "id";
      let sortDirection = "asc";

      async function init() {
        try {
          const response = await fetch("data/manifest.json");
          fullManifest = await response.json();
          
          const urlParams = new URLSearchParams(window.location.search);
          const marketParam = urlParams.get('market');
          if (marketParam && ['twse', 'tpex'].includes(marketParam)) {
              currentMarket = marketParam;
          }

          const marketSelect = document.getElementById("market-select");
          marketSelect.value = currentMarket;
          marketSelect.addEventListener("change", (e) => {
              if (e.target.value === "warrant") {
                  window.location.href = "warrant.html";
                  return;
              }
              currentMarket = e.target.value;
              updateMarketData();
          });

          updateMarketData();

          document
            .getElementById("stock-search")
            .addEventListener("input", filterStocks);
          document
            .getElementById("price-min")
            .addEventListener("input", filterStocks);
          document
            .getElementById("price-max")
            .addEventListener("input", filterStocks);
          document
            .getElementById("volume-min")
            .addEventListener("input", filterStocks);
          document
            .getElementById("clear-filters")
            .addEventListener("click", () => {
              document.getElementById("stock-search").value = "";
              document.getElementById("price-min").value = "";
              document.getElementById("price-max").value = "";
              document.getElementById("volume-min").value = "";
              filterStocks();
            });

          // Gap Jump sort listener
          document
            .getElementById("gap-sort")
            .addEventListener("change", renderGapList);

          // Gap Type switcher listener
          document
            .getElementById("gap-type-switcher")
            .addEventListener("change", () => {
                const date = document.getElementById("date-picker").value;
                loadGapData(date);
            });

          // Pagination listeners
          document.getElementById("prev-page").addEventListener("click", () => {
            if (currentPage > 1) {
              currentPage--;
              renderStockTable();
            }
          });
          document.getElementById("next-page").addEventListener("click", () => {
            const maxPage = Math.ceil(filteredStocks.length / rowsPerPage);
            if (currentPage < maxPage) {
              currentPage++;
              renderStockTable();
            }
          });
        } catch (error) {
          console.error("Initialization error:", error);
        }
      }

      async function updateMarketData() {
          manifest = fullManifest[currentMarket];
          if (!manifest) return;

          // Populate date picker
          const datePicker = document.getElementById("date-picker");
          const savedDate = datePicker.value;
          datePicker.innerHTML = "";
          manifest.daily_price.forEach((date, i) => {
            const option = document.createElement("option");
            option.value = date;
            option.textContent = date;
            datePicker.appendChild(option);
          });

          // Try to keep the same date if available in the new market
          if (savedDate && manifest.daily_price.includes(savedDate)) {
              datePicker.value = savedDate;
          }

          datePicker.onchange = (e) => loadStockData(e.target.value);

          // Load initial data
          if (manifest.daily_index.length > 0) {
            await loadIndexData();
          }
          if (manifest.daily_price.length > 0) {
            await loadStockData(datePicker.value);
          }
      }

      async function loadIndexData() {
        const allData = [];
        const seenDates = new Set();

        const indexFiles = manifest.daily_index.slice(0, 30).reverse(); // Last 30 days
        
        for (const date of indexFiles) {
          try {
            const response = await fetch(`data/${currentMarket}/daily_index/${date}.json`);
            const data = await response.json();
            data.forEach((item) => {
              if (!seenDates.has(item.date)) {
                allData.push(item);
                seenDates.add(item.date);
              }
            });
          } catch (e) {
            console.error(`Error loading index ${date}:`, e);
          }
        }

        // Sort by date
        allData.sort((a, b) => a.date.localeCompare(b.date));
        indexData = allData;

        if (indexData.length > 0) {
          const latest = indexData[indexData.length - 1];
          document.getElementById("last-update").textContent =
            `最後更新: ${latest.date}`;
          document.getElementById("summary-index").textContent = 
            latest.index.toLocaleString();
          
          const changes = parseFloat(latest.changes);
          const changesEl = document.getElementById("summary-changes");
          changesEl.textContent = (changes >= 0 ? "+" : "") + changes.toFixed(2);
          changesEl.style.color = changes >= 0 ? "var(--up)" : "var(--down)";

          document.getElementById("summary-turnover").textContent =
            (latest.turnover / 100000000).toFixed(2) + " 億";
          document.getElementById("summary-volume").textContent =
            (latest.volume / 1000000).toFixed(2) + " 百萬";
          document.getElementById("summary-transactions").textContent =
            (latest.transactions / 10000).toFixed(2) + " 萬";
          renderChart(indexData);
        }
      }

      async function loadStockData(date) {
        document.getElementById("stock-list").innerHTML = "";
        document.getElementById("stock-loader").style.display = "flex";
        document.getElementById("gap-list").innerHTML = '<div class="loader" style="height: 100px">載入中...</div>';
        document.getElementById("punish-list").innerHTML = '<div class="loader" style="height: 100px">載入中...</div>';

        try {
          const response = await fetch(`data/${currentMarket}/daily_price/${date}.json`);
          currentStockData = await response.json();

          const dates = manifest.daily_price;
          const idx = dates.indexOf(date);
          let prevData = [];
          if (idx !== -1 && idx + 1 < dates.length) {
              const prevDate = dates[idx + 1];
              try {
                  const prevResponse = await fetch(`data/${currentMarket}/daily_price/${prevDate}.json`);
                  prevData = await prevResponse.json();
              } catch (e) { console.error("Error loading prev day:", e); }
          }
          const prevMap = new Map(prevData.map(s => [s.id, s.close]));

          currentStockData.forEach((s) => {
            s.prev_close = prevMap.get(s.id);
            s.diff = s.prev_close ? parseFloat((s.close - s.prev_close).toFixed(2)) : 0;
            s.ratio = (s.prev_close && s.prev_close !== 0) 
                      ? parseFloat(((s.close - s.prev_close) / s.prev_close * 100).toFixed(2)) 
                      : 0;
          });

          filterStocks();
          await loadGapData(date);

          if (manifest.daily_punish && manifest.daily_punish.includes(date)) {
            const punishResponse = await fetch(`data/${currentMarket}/daily_punish/${date}.json`);
            currentPunishData = await punishResponse.json();
            renderPunishList();
          } else {
            currentPunishData = [];
            document.getElementById("punish-list").innerHTML =
              '<div style="padding: 1.5rem; color: var(--text-muted); text-align: center; font-style: italic;">今日無處置股票</div>';
            document.getElementById("punish-count").textContent = "0";
          }
        } catch (error) {
          console.error("Error loading data:", error);
        } finally {
          document.getElementById("stock-loader").style.display = "none";
        }
      }

      async function loadGapData(date) {
        const type = document.getElementById("gap-type-switcher").value;
        const sortSelect = document.getElementById("gap-sort");
        
        // Update sort options based on type
        if (type === "gap_jump") {
            sortSelect.innerHTML = `
                <option value="diff-desc">漲點 ↓</option>
                <option value="diff-asc">漲點 ↑</option>
                <option value="ratio-desc">漲幅 ↓</option>
                <option value="ratio-asc">漲幅 ↑</option>
            `;
        } else {
            sortSelect.innerHTML = `
                <option value="diff-asc">跌點 ↓</option>
                <option value="diff-desc">跌點 ↑</option>
                <option value="ratio-asc">跌幅 ↓</option>
                <option value="ratio-desc">跌幅 ↑</option>
            `;
        }

        if (manifest[type] && manifest[type].includes(date)) {
          try {
            const gapResponse = await fetch(`data/${currentMarket}/${type}/${date}.json`);
            currentGapData = await gapResponse.json();
            renderGapList();
          } catch (e) {
            console.error(`Error loading ${type}:`, e);
            currentGapData = [];
            renderGapList();
          }
        } else {
          currentGapData = [];
          document.getElementById("gap-list").innerHTML =
            '<div style="padding: 1.5rem; color: var(--text-muted); text-align: center; font-style: italic;">無此日期數據</div>';
          document.getElementById("gap-count").textContent = "0";
        }
      }

      function renderGapList() {
        const container = document.getElementById("gap-list");
        const countLabel = document.getElementById("gap-count");
        const sortVal = document.getElementById("gap-sort").value;
        const type = document.getElementById("gap-type-switcher").value;

        container.innerHTML = "";
        countLabel.textContent = currentGapData.length;

        if (currentGapData.length === 0) {
            container.innerHTML = '<div style="padding: 1.5rem; color: var(--text-muted); text-align: center; font-style: italic;">無符合條件股票</div>';
            return;
        }

        // Copy for sorting
        const data = [...currentGapData];
        const [sortKey, sortDir] = sortVal.split("-");

        data.sort((a, b) => {
          const valA = a[sortKey];
          const valB = b[sortKey];
          return sortDir === "asc" ? valA - valB : valB - valA;
        });

        data.forEach((stock) => {
          const item = document.createElement("div");
          item.className = "list-item";
          item.style.display = "flex";
          item.style.justifyContent = "space-between";
          item.style.alignItems = "center";
          
          const isUp = type === "gap_jump";
          const priceClass = isUp ? "price-up" : "price-down";
          const diffPrefix = stock.diff > 0 ? "+" : "";

          item.innerHTML = `
                    <div>
                        <div style="font-weight: 700; color: var(--text);"><a href="warrant.html?search=${stock.id}" style="color: inherit; text-decoration: none; border-bottom: 1px dashed var(--text-muted);">${stock.name}</a> <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: normal;">${stock.id}</span></div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">量: ${(stock.volume / 1000).toFixed(0)} 張</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="${priceClass}" style="font-size: 1rem;">${stock.today_close}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 500;">${diffPrefix}${stock.diff} (${stock.ratio}%)</div>
                    </div>
                `;
          container.appendChild(item);
        });
      }

      function renderPunishList() {
        const container = document.getElementById("punish-list");
        const countLabel = document.getElementById("punish-count");

        container.innerHTML = "";
        countLabel.textContent = currentPunishData.length;

        if (currentPunishData.length === 0) {
            container.innerHTML = '<div style="padding: 1.5rem; color: var(--text-muted); text-align: center; font-style: italic;">今日無處置股票</div>';
            return;
        }

        currentPunishData.forEach((stock) => {
          const item = document.createElement("div");
          item.className = "list-item";
          
          item.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem;">
                        <div style="font-weight: 700; color: var(--text);"><a href="warrant.html?search=${stock.id}" style="color: inherit; text-decoration: none; border-bottom: 1px dashed var(--text-muted);">${stock.name}</a> <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: normal;">${stock.id}</span></div>
                        <span class="tag" style="margin: 0; background: #fee2e2; color: #b91c1c;">${stock.measure}</span>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between;">
                        <span>期間: ${stock.from} ~ ${stock.to}</span>
                        <span>次數: ${stock.accumulated}</span>
                    </div>
                `;
          container.appendChild(item);
        });
      }

      function setSort(column) {
        if (sortColumn === column) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortColumn = column;
          sortDirection = "asc";
        }
        currentPage = 1;
        renderStockTable();
      }

      function renderStockTable() {
        const stocks = filteredStocks;
        const tbody = document.getElementById("stock-list");
        tbody.innerHTML = "";
        document.getElementById("stock-count").textContent = stocks.length;

        stocks.sort((a, b) => {
          let valA = a[sortColumn];
          let valB = b[sortColumn];

          // Handle n/a cases for sorting
          if (sortColumn === 'ratio') {
              valA = a.prev_close ? a.ratio : -Infinity;
              valB = b.prev_close ? b.ratio : -Infinity;
          } else if (sortColumn === 'diff') {
              valA = a.prev_close ? (a.close - a.prev_close) : -Infinity;
              valB = b.prev_close ? (b.close - b.prev_close) : -Infinity;
          }

          if (typeof valA === "string") {
            return sortDirection === "asc"
              ? valA.localeCompare(valB)
              : valB.localeCompare(valA);
          } else {
            return sortDirection === "asc" ? valA - valB : valB - valA;
          }
        });

        ["id", "name", "close", "diff", "ratio", "volume"].forEach((col) => {
          const span = document.getElementById(`sort-${col}`);
          if (span) {
            span.textContent = col === sortColumn ? (sortDirection === "asc" ? "↑" : "↓") : "";
            span.style.color = col === sortColumn ? "var(--primary)" : "";
          }
        });

        const maxPage = Math.ceil(stocks.length / rowsPerPage) || 1;
        if (currentPage > maxPage) currentPage = maxPage;
        document.getElementById("page-info").textContent = `第 ${currentPage} / ${maxPage} 頁`;
        document.getElementById("prev-page").disabled = currentPage === 1;
        document.getElementById("next-page").disabled = currentPage === maxPage;

        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = stocks.slice(start, end);

        pageData.forEach((stock) => {
          const hasPrev = stock.prev_close !== undefined;
          const diff = stock.diff;
          const diffClass = diff > 0 ? "price-up" : diff < 0 ? "price-down" : "";
          const diffPrefix = diff > 0 ? "+" : "";
          const diffText = hasPrev ? diff.toFixed(2) : "n/a";
          
          const ratioText = hasPrev ? (stock.ratio >= 0 ? "+" : "") + stock.ratio.toFixed(2) + "%" : "n/a";
          const ratioClass = stock.ratio > 0 ? "price-up" : stock.ratio < 0 ? "price-down" : "";

          const tr = document.createElement("tr");
          tr.innerHTML = `
                    <td style="font-weight: 500;">${stock.id}</td>
                    <td style="font-weight: 600;"><a href="warrant.html?search=${stock.id}" style="color: inherit; text-decoration: none; border-bottom: 1px dashed var(--text-muted);">${stock.name}</a></td>
                    <td style="font-weight: 600;">${stock.close}</td>
                    <td class="${diffClass}" style="font-weight: 700;">${diff !== null ? diffPrefix + diffText : "n/a"}</td>
                    <td class="${ratioClass}" style="font-weight: 700;">${ratioText}</td>
                    <td style="color: var(--text-muted);">${(stock.volume / 1000).toLocaleString(undefined, {maximumFractionDigits:0})} 張</td>
                `;
          tbody.appendChild(tr);
        });
      }

      function filterStocks() {
        const query = document
          .getElementById("stock-search")
          .value.toLowerCase();
        const minPrice =
          parseFloat(document.getElementById("price-min").value) || 0;
        const maxPrice =
          parseFloat(document.getElementById("price-max").value) || Infinity;
        const minVolume =
          (parseInt(document.getElementById("volume-min").value) || 0) * 1000;

        filteredStocks = currentStockData.filter((s) => {
          const matchesSearch =
            s.id.toLowerCase().includes(query) ||
            s.name.toLowerCase().includes(query);
          const matchesPrice = s.close >= minPrice && s.close <= maxPrice;
          const matchesVolume = s.volume >= minVolume;
          return matchesSearch && matchesPrice && matchesVolume;
        });

        currentPage = 1;
        renderStockTable();
      }

      function renderChart(data) {
        const ctx = document.getElementById("indexChart").getContext("2d");

        if (chart) chart.destroy();

        const labels = data.map((d) => d.date);
        const prices = data.map((d) => d.index);

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "大盤指數",
                data: prices,
                borderColor: "#3b82f6",
                backgroundColor: "rgba(59, 130, 246, 0.1)",
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: "#3b82f6",
                pointBorderColor: "#fff",
                pointHoverRadius: 6,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: "rgba(15, 23, 42, 0.9)",
                padding: 12,
                titleFont: { size: 14, weight: "bold" },
                bodyFont: { size: 13 },
                displayColors: false,
              }
            },
            scales: {
              y: {
                beginAtZero: false,
                grid: { color: "#f1f5f9" },
                ticks: {
                  font: { size: 11 },
                  color: "#64748b"
                }
              },
              x: {
                grid: { display: false },
                ticks: {
                  font: { size: 11 },
                  color: "#64748b",
                  maxRotation: 45,
                  minRotation: 45
                }
              },
            },
          },
        });
      }

      init();
    </script>
  </body>
</html>
