<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warrant Filter | 權證篩選器</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Huninn&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #3b82f6;
        --primary-dark: #2563eb;
        --bg: #f1f5f9;
        --card-bg: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --up: #ef4444;
        --down: #22c55e;
        --accent: #8b5cf6;
      }

      body {
        font-family:
          "Huninn",
          "Noto Sans TC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      header {
        background-color: var(--card-bg);
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        font-family: "Huninn", "Noto Sans TC", sans-serif;
        background: linear-gradient(to right, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 1.5rem;
      }

      .card {
        background: var(--card-bg);
        border-radius: 1rem;
        border: 1px solid var(--border);
        padding: 1.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        margin-bottom: 1.5rem;
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 700;
        font-family: "Huninn", "Noto Sans TC", sans-serif;
        margin-bottom: 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid var(--primary);
        padding-left: 0.75rem;
      }

      .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .filter-label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-muted);
      }

      .filter-range {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .filter-input {
        flex: 1;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
        min-width: 0;
      }

      .filter-input:focus {
        border-color: var(--primary);
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        text-align: left;
      }

      th {
        padding: 1rem 0.75rem;
        background-color: #f8fafc;
        border-bottom: 2px solid var(--border);
        font-weight: 600;
        color: var(--text-muted);
        font-size: 0.875rem;
        white-space: nowrap;
        cursor: pointer;
      }

      th:hover {
        background-color: #f1f5f9;
      }

      td {
        padding: 1rem 0.75rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.875rem;
        white-space: nowrap;
      }

      tr:hover td {
        background-color: #f8fafc;
      }

      .btn {
        padding: 0.6rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        font-size: 0.875rem;
      }

      .btn-primary {
        background-color: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--primary-dark);
        transform: translateY(-1px);
      }

      .nav-bar {
        display: flex;
        gap: 0.5rem;
      }

      .nav-link {
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 700;
        padding: 0.5rem 1rem;
        border-radius: 0.75rem;
        transition: all 0.2s;
        font-size: 0.9375rem;
      }

      .nav-link:hover {
        background-color: #f1f5f9;
        color: var(--primary);
      }

      .nav-link.active {
        background-color: #dbeafe;
        color: var(--primary-dark);
      }

      .loader {
        display: none;
        justify-content: center;
        align-items: center;
        height: 200px;
        font-style: italic;
        color: var(--text-muted);
      }

      .badge {
        display: inline-block;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 0.5rem;
      }

      .badge-primary { background-color: #dbeafe; color: #1e40af; }
    </style>
  </head>
  <body>
    <header>
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <img src="assets/logo.png" alt="Logo" style="height: 40px; width: auto;" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
        <span style="display: none; font-size: 1.5rem;">🔍</span>
        <h1 style="margin-right: 1rem;">Warrant Filter</h1>
        <nav class="nav-bar">
            <a href="index.html" class="nav-link">上市</a>
            <a href="tpex.html" class="nav-link">上櫃</a>
            <a href="warrant.html" class="nav-link">權證</a>
            <a href="warrant_filter.html" class="nav-link active">權證篩選</a>
        </nav>
      </div>
    </header>

    <div class="container">
      <div class="card">
        <div class="card-title">篩選條件</div>
        <div class="filter-grid">
          <div class="filter-group">
            <label class="filter-label">標的代號 (多個請用逗號隔開)</label>
            <input type="text" id="stock_codes" class="filter-input" placeholder="例如: 2330, 2317" />
          </div>
          <div class="filter-group">
            <label class="filter-label">權證類型</label>
            <select id="type" class="filter-input">
              <option value="0">全部</option>
              <option value="1" selected>認購</option>
              <option value="2">認售</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">價內外程度 (%)</label>
            <div class="filter-range">
                <input type="text" id="in_out_left" class="filter-input" value="-20" />
                <span>~</span>
                <input type="text" id="in_out_right" class="filter-input" value="20" />
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">實質槓桿</label>
            <div class="filter-range">
                <input type="text" id="leverage_left" class="filter-input" placeholder="最小" value="3" />
                <span>~</span>
                <input type="text" id="leverage_right" class="filter-input" placeholder="最大" />
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">成交量 (張)</label>
            <div class="filter-range">
                <input type="text" id="volume_left" class="filter-input" placeholder="最小" value="500" />
                <span>~</span>
                <input type="text" id="volume_right" class="filter-input" placeholder="最大" />
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">剩餘天數</label>
            <div class="filter-range">
                <input type="text" id="period_left" class="filter-input" value="90" />
                <span>~</span>
                <input type="text" id="period_right" class="filter-input" placeholder="最大" />
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">流通在外比例 (%)</label>
            <div class="filter-range">
                <input type="text" id="out_vol_rate_left" class="filter-input" placeholder="最小" value="20" />
                <span>~</span>
                <input type="text" id="out_vol_rate_right" class="filter-input" placeholder="最大" value="80" />
            </div>
          </div>
        </div>
        <div style="display: flex; justify-content: flex-end;">
          <button id="search-btn" class="btn btn-primary">執行篩選</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span>篩選結果 <span id="warrant-count" class="badge badge-primary">0</span></span>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th onclick="setSort('權證代碼')">權證代碼 <span id="sort-權證代碼"></span></th>
                <th onclick="setSort('權證名稱')">權證名稱 <span id="sort-權證名稱"></span></th>
                <th onclick="setSort('標的名稱')">標的 <span id="sort-標的名稱"></span></th>
                <th onclick="setSort('認購/認售')">認購/認售 <span id="sort-認購/認售"></span></th>
                <th onclick="setSort('權證成交價')">成交價 <span id="sort-權證成交價"></span></th>
                <th onclick="setSort('權證成交量')">成交量 <span id="sort-權證成交量"></span></th>
                <th onclick="setSort('流通在外比例')">流通在外% <span id="sort-流通在外比例"></span></th>
                <th onclick="setSort('最新履約價')">履約價 <span id="sort-最新履約價"></span></th>
                <th onclick="setSort('剩餘天數')">剩餘天數 <span id="sort-剩餘天數"></span></th>
                <th onclick="setSort('價內外程度')">價內外 <span id="sort-價內外程度"></span></th>
                <th onclick="setSort('實質槓桿')">實質槓桿 <span id="sort-實質槓桿"></span></th>
              </tr>
            </thead>
            <tbody id="warrant-list"></tbody>
          </table>
        </div>
        <div id="loader" class="loader">正在分析市場數據...</div>
      </div>
    </div>

    <script>
      let currentData = [];
      let sortColumn = "權證成交量";
      let sortDirection = "desc";

      async function fetchFilteredWarrants() {
        const loader = document.getElementById("loader");
        const list = document.getElementById("warrant-list");
        const countLabel = document.getElementById("warrant-count");

        loader.style.display = "flex";
        list.innerHTML = "";
        countLabel.textContent = "0";

        const stockCodesInput = document.getElementById("stock_codes").value;
        const typeSelect = document.getElementById("type");
        const selectedType = typeSelect.value;

        const payload = {
          stock_codes: stockCodesInput ? stockCodesInput.split(",").map(s => s.trim()) : [],
          type: [selectedType],
          in_out: {
            left: document.getElementById("in_out_left").value || "",
            right: document.getElementById("in_out_right").value || ""
          },
          leverage: {
            left: document.getElementById("leverage_left").value || "",
            right: document.getElementById("leverage_right").value || ""
          },
          volume: {
            left: document.getElementById("volume_left").value || "",
            right: document.getElementById("volume_right").value || ""
          },
          period: {
            left: document.getElementById("period_left").value || "",
            right: document.getElementById("period_right").value || ""
          },
          out_vol_rate: {
            left: document.getElementById("out_vol_rate_left").value || "",
            right: document.getElementById("out_vol_rate_right").value || ""
          }
        };

        try {
          const response = await fetch("https://market.smallplum.xyz/api/strategy/warrant/filter", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error("API request failed");

          currentData = await response.json();
          renderTable();
        } catch (error) {
          console.error("Error:", error);
          list.innerHTML = `<tr><td colspan="11" style="text-align: center; color: var(--up);">載入失敗，請稍後再試</td></tr>`;
        } finally {
          loader.style.display = "none";
        }
      }

      function setSort(col) {
        if (sortColumn === col) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortColumn = col;
          sortDirection = "desc";
        }
        renderTable();
      }

      function renderTable() {
        const list = document.getElementById("warrant-list");
        const countLabel = document.getElementById("warrant-count");
        list.innerHTML = "";
        countLabel.textContent = currentData.length;

        const sortedData = [...currentData].sort((a, b) => {
          let vA = a[sortColumn];
          let vB = b[sortColumn];
          
          if (["權證成交價", "權證成交量", "流通在外比例", "最新履約價", "剩餘天數", "實質槓桿"].includes(sortColumn)) {
              vA = parseFloat(vA) || 0;
              vB = parseFloat(vB) || 0;
          }

          if (vA < vB) return sortDirection === "asc" ? -1 : 1;
          if (vA > vB) return sortDirection === "asc" ? 1 : -1;
          return 0;
        });

        document.querySelectorAll("th span").forEach(s => s.textContent = "");
        const indicator = document.getElementById("sort-" + sortColumn);
        if (indicator) indicator.textContent = sortDirection === "asc" ? " ↑" : " ↓";

        sortedData.forEach(w => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="font-weight: 500;">
                <a href="https://www.warrantwin.com.tw/eyuanta/warrant/Info.aspx?WID=${w["權證代碼"]}" target="_blank" style="color: inherit; text-decoration: none; border-bottom: 1px dashed var(--text-muted);">${w["權證代碼"]}</a>
            </td>
            <td style="font-weight: 600;">${w["權證名稱"]}</td>
            <td>
                <div style="font-weight: 600;">${w["標的名稱"]}</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">${w["標的代碼"]}</div>
            </td>
            <td>${w["認購/認售"]}</td>
            <td style="font-weight: 700; color: var(--primary);">${w["權證成交價"]}</td>
            <td>${parseInt(w["權證成交量"] || 0).toLocaleString()}</td>
            <td>${w["流通在外比例"]}%</td>
            <td>${w["最新履約價"]}</td>
            <td>${w["剩餘天數"]}</td>
            <td>${w["價內外程度"]}</td>
            <td style="font-weight: 700;">${w["實質槓桿"]}</td>
          `;
          list.appendChild(tr);
        });

        if (currentData.length === 0) {
          list.innerHTML = `<tr><td colspan="11" style="text-align: center; color: var(--text-muted);">無符合條件的權證</td></tr>`;
        }
      }

      document.getElementById("search-btn").onclick = fetchFilteredWarrants;

      // Initial fetch
      fetchFilteredWarrants();
    </script>
  </body>
</html>
